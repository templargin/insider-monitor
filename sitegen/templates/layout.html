<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}insider-monitor{% endblock %}</title>
  <link rel="stylesheet" href="{{ root }}static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="{{ root }}" class="brand">insider-monitor</a>
    <nav>
      <a href="{{ root }}insiders/">Daily</a>
      <a href="{{ root }}companies/">Companies</a>
      <a href="{{ root }}about/">About</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    Generated {{ generated_at }} · data: SEC EDGAR + yfinance · code: <a href="https://github.com/templargin/insider-monitor">github</a>
  </footer>
</body>
</html>
