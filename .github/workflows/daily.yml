name: Daily insider monitor

on:
  schedule:
    # 10:30 UTC Mon-Fri = 6:30am EDT (summer) / 5:30am EST (winter)
    # Picked to give the run + GH Actions queueing slack to finish before 7am ET.
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Daily run
        run: python -m scripts.daily_run

      - name: Commit + push
        run: |
          git config user.name "insider-monitor[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update $(date -u +%Y-%m-%d)"
            git push
          fi
