name: Tests

# daily.yml runs these too, but only at 10:30 UTC on a schedule — which would let
# a change land broken and stay broken until the next morning's run. This is the
# gate on the change itself.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest -q
